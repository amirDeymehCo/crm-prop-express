version: "3.9"

services:
  app:
    build: .
    container_name: props-app-crm
    ports:
      - "8040:8040"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 8040
    depends_on:
      - db
    volumes:
      - public_data:/app/public
    command: npm start
    networks:
      - props-network-crm

  db:
    image: mysql:8
    container_name: mysql-db-crm
    restart: always
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3316:3306"
    volumes:
      - crm_mysql_data:/var/lib/mysql
    networks:
      - props-network-crm

volumes:
  crm_mysql_data:
  public_data:

networks:
  props-network-crm:
    driver: bridge
