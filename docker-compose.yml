version: "3.9"

services:
  app:
    build: .
    container_name: props-app-crm
    ports:
      - "8040:${PORT}"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - public_data:/app/public
    command: npm start
    networks:
      - props-network-crm

  db:
    image: mysql:8
    container_name: mysql-db-crm
    restart: always
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3316:3306"
    volumes:
      - crm_mysql_data:/var/lib/mysql
    networks:
      - props-network-crm

volumes:
  crm_mysql_data:
  public_data:

networks:
  props-network-crm:
    driver: bridge
